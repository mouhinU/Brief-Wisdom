name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: ./mvnw clean compile -B

      - name: Test
        run: ./mvnw test -B -Dsurefire.failIfNoSpecifiedTests=false

      - name: Package
        run: ./mvnw package -B -DskipTests

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历数据管理</title>
    <link rel="stylesheet" href="css/navbar.css?v=11">
    <link rel="stylesheet" href="css/resume-manage.css?v=1">
    <link rel="stylesheet" href="css/resume-editor.css">
    <link rel="stylesheet" href="css/ai-polish.css?v=2">
</head>
<body>
<div class="container">
    <header>
        <h1>简历数据管理</h1>
        <a href="/" class="back-link">← 返回主页</a>
    </header>

    <!-- Tab 导航（由 initPageTabs 动态渲染） -->
    <nav class="tabs"></nav>

    <!-- 所有 Tab 内容由对应组件动态渲染，HTML 只保留空容器 -->

    <!-- Tab: 在线编辑 -->
    <section id="editor-tab-content" class="tab-content active"></section>

    <!-- Tab: 工作经历 -->
    <section id="experience-tab-content" class="tab-content"></section>

    <!-- Tab: 项目经历 -->
    <section id="project-tab-content" class="tab-content"></section>

    <!-- Tab: 项目成果 -->
    <section id="achievement-tab-content" class="tab-content"></section>

    <!-- Tab: 技术栈 -->
    <section id="tech-stack-tab-content" class="tab-content"></section>
</div>

<!-- 公共导航栏 -->
<script src="js/i18n.js"></script>
<script src="js/api-request.js"></script>
<script src="js/navbar.js?v=10"></script>
<!-- AI 润色组件（必需） -->
<script src="components/ai-polish.template.js"></script>
<script src="components/ai-polish.js"></script>
<!-- 组件加载器 -->
<script src="components/component-loader.js"></script>
<!-- 简历管理页面脚本（轻量级，只负责Tab切换和组件加载） -->
<script src="js/resume-manage-lite.js"></script>
</body>
</html>

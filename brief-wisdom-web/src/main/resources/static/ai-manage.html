<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手管理</title>
    <link rel="stylesheet" href="css/navbar.css?v=11">
    <link rel="stylesheet" href="css/ai-manage.css?v=10">
</head>
<body>
<div class="container">
    <header>
        <h1>AI助手管理</h1>
    </header>

    <!-- 顶部 Tab 导航（由 initPageTabs 动态渲染） -->
    <nav class="manage-tabs"></nav>

    <!-- Tab 1: 会话历史 -->
    <div id="sessions-tab-content" class="manage-tab-content">
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>用户级别：</label>
                <select id="level-filter" onchange="onLevelFilterChange()">
                    <option value="">全部</option>
                    <option value="admin">管理员</option>
                    <option value="vip">会员</option>
                    <option value="normal">普通用户</option>
                </select>
            </div>
            <div class="filter-group">
                <label>查询方式：</label>
                <select id="query-mode" onchange="onQueryModeChange()">
                    <option value="user">按用户查询会话</option>
                    <option value="level">按级别查询会话</option>
                </select>
            </div>
        </div>

        <!-- 三栏布局 -->
        <div class="panels">
            <!-- 左栏：用户列表 -->
            <div class="panel panel-users">
                <div class="panel-header">
                    <h2>用户列表</h2>
                    <span id="user-count" class="count-badge">0</span>
                </div>
                <div id="user-list" class="panel-body"></div>
            </div>

            <!-- 中栏：会话列表 -->
            <div class="panel panel-sessions">
                <div class="panel-header">
                    <h2 id="session-title">会话列表</h2>
                    <span id="session-count" class="count-badge">0</span>
                </div>
                <div id="session-list" class="panel-body">
                    <div class="empty-hint">请选择用户查看会话</div>
                </div>
            </div>

            <!-- 右栏：消息详情 -->
            <div class="panel panel-messages">
                <div class="panel-header">
                    <h2 id="message-title">消息详情</h2>
                    <span id="message-count" class="count-badge">0</span>
                </div>
                <div id="message-list" class="panel-body">
                    <div class="empty-hint">请选择会话查看消息</div>
                </div>
            </div>
        </div>
    </div><!-- /sessions-tab-content -->

    <!-- Tab 2: 知识库 -->
    <div id="knowledge-tab-content" class="manage-tab-content">
        <div class="knowledge-layout">
            <!-- 左侧：知识库列表 -->
            <div class="knowledge-sidebar">
                <div class="knowledge-sidebar-header">
                    <h3>知识库</h3>
                    <button class="btn-new-base" onclick="showBaseForm()">+ 新建</button>
                </div>
                <div id="knowledge-base-list" class="knowledge-base-list">
                    <div class="knowledge-empty-hint">加载中...</div>
                </div>
            </div>

            <!-- 右侧：文档列表 -->
            <div class="knowledge-main-content">
                <div class="knowledge-content-header">
                    <div class="knowledge-content-title">
                        <h2 id="knowledge-current-base-name">请选择知识库</h2>
                        <span id="knowledge-doc-count" class="knowledge-count-badge">0</span>
                    </div>
                    <div class="knowledge-content-actions">
                        <input type="text" id="knowledge-search-input" class="knowledge-search-input" placeholder="搜索文档..."
                               onkeyup="handleSearch(event)">
                        <div class="knowledge-doc-type-filter">
                            <button class="knowledge-filter-btn active" data-type="" onclick="filterByType('')">全部</button>
                            <button class="knowledge-filter-btn" data-type="INTERNAL" onclick="filterByType('INTERNAL')">📝
                                内部文档
                            </button>
                            <button class="knowledge-filter-btn" data-type="FILE" onclick="filterByType('FILE')">📎 文件</button>
                            <button class="knowledge-filter-btn" data-type="LINK" onclick="filterByType('LINK')">🔗 外部链接
                            </button>
                        </div>
                        <button class="btn btn-primary" id="knowledge-add-doc-btn" onclick="showDocForm()" style="display:none;">+
                            新建文档
                        </button>
                    </div>
                </div>

                <!-- 文档列表 -->
                <div id="knowledge-document-list" class="knowledge-document-list">
                    <div class="knowledge-empty-hint">请从左侧选择一个知识库</div>
                </div>

                <!-- 分页 -->
                <div id="knowledge-pagination" class="knowledge-pagination" style="display:none;"></div>
            </div>
        </div>

        <!-- 知识库表单弹窗 -->
        <div id="knowledge-base-modal" class="knowledge-modal" style="display:none;">
            <div class="knowledge-modal-content">
                <div class="knowledge-modal-header">
                    <h3 id="knowledge-base-modal-title">新建知识库</h3>
                    <button class="knowledge-modal-close" onclick="closeBaseModal()">&times;</button>
                </div>
                <form id="knowledge-base-form" class="knowledge-modal-form" onsubmit="saveBase(event)">
                    <input type="hidden" id="knowledge-base-id">
                    <div class="knowledge-form-group">
                        <label>名称 *</label>
                        <input type="text" id="knowledge-base-name" required placeholder="知识库名称">
                    </div>
                    <div class="knowledge-form-group">
                        <label>描述</label>
                        <textarea id="knowledge-base-description" rows="3" placeholder="知识库描述"></textarea>
                    </div>
                    <div class="knowledge-form-group">
                        <label>图标</label>
                        <input type="text" id="knowledge-base-icon" value="📚" placeholder="emoji 图标">
                    </div>
                    <div class="knowledge-form-row">
                        <div class="knowledge-form-group">
                            <label>排序</label>
                            <input type="number" id="knowledge-base-sort-order" value="0" min="0">
                        </div>
                        <div class="knowledge-form-group">
                            <label>是否公开</label>
                            <select id="knowledge-base-is-public">
                                <option value="0">私有</option>
                                <option value="1">公开</option>
                            </select>
                        </div>
                    </div>
                    <div class="knowledge-form-group">
                        <label>父级知识库</label>
                        <select id="knowledge-base-parent-id">
                            <option value="0">无（顶级知识库）</option>
                        </select>
                    </div>
                    <div class="knowledge-form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeBaseModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 文档表单弹窗 -->
        <div id="knowledge-doc-modal" class="knowledge-modal" style="display:none;">
            <div class="knowledge-modal-content knowledge-modal-large">
                <div class="knowledge-modal-header">
                    <h3 id="knowledge-doc-modal-title">新建文档</h3>
                    <button class="knowledge-modal-close" onclick="closeDocModal()">&times;</button>
                </div>
                <form id="knowledge-doc-form" class="knowledge-modal-form" onsubmit="saveDoc(event)">
                    <input type="hidden" id="knowledge-doc-id">
                    <div class="knowledge-form-group">
                        <label>文档类型 *</label>
                        <div class="knowledge-doc-type-selector">
                            <label class="knowledge-doc-type-option">
                                <input type="radio" name="docType" value="INTERNAL" checked
                                       onchange="onDocTypeChange()">
                                <span class="knowledge-doc-type-card">
                                    <span class="knowledge-doc-type-icon">📝</span>
                                    <span class="knowledge-doc-type-name">内部文档</span>
                                    <span class="knowledge-doc-type-desc">富文本编辑</span>
                                </span>
                            </label>
                            <label class="knowledge-doc-type-option">
                                <input type="radio" name="docType" value="FILE" onchange="onDocTypeChange()">
                                <span class="knowledge-doc-type-card">
                                    <span class="knowledge-doc-type-icon">📎</span>
                                    <span class="knowledge-doc-type-name">文件上传</span>
                                    <span class="knowledge-doc-type-desc">PDF/Word等</span>
                                </span>
                            </label>
                            <label class="knowledge-doc-type-option">
                                <input type="radio" name="docType" value="LINK" onchange="onDocTypeChange()">
                                <span class="knowledge-doc-type-card">
                                    <span class="knowledge-doc-type-icon">🔗</span>
                                    <span class="knowledge-doc-type-name">外部链接</span>
                                    <span class="knowledge-doc-type-desc">引用外部文档</span>
                                </span>
                            </label>
                        </div>
                    </div>
                    <div class="knowledge-form-group">
                        <label>标题 *</label>
                        <input type="text" id="knowledge-doc-title" required placeholder="文档标题">
                    </div>
                    <div id="knowledge-internal-fields">
                        <div class="knowledge-form-group">
                            <label>文档内容</label>
                            <textarea id="knowledge-doc-content" rows="15" class="knowledge-content-editor"
                                      placeholder="请输入文档内容（支持HTML）"></textarea>
                        </div>
                    </div>
                    <div id="knowledge-file-fields" style="display:none;">
                        <div class="knowledge-form-group">
                            <label>文件URL *</label>
                            <input type="text" id="knowledge-doc-file-url" placeholder="文件存储URL">
                        </div>
                        <div class="knowledge-form-row">
                            <div class="knowledge-form-group">
                                <label>文件名</label>
                                <input type="text" id="knowledge-doc-file-name" placeholder="原始文件名">
                            </div>
                            <div class="knowledge-form-group">
                                <label>文件大小(字节)</label>
                                <input type="number" id="knowledge-doc-file-size" placeholder="文件大小">
                            </div>
                        </div>
                        <div class="knowledge-form-group">
                            <label>文件类型</label>
                            <input type="text" id="knowledge-doc-file-type" placeholder="如: application/pdf">
                        </div>
                    </div>
                    <div id="knowledge-link-fields" style="display:none;">
                        <div class="knowledge-form-group">
                            <label>链接URL *</label>
                            <input type="text" id="knowledge-doc-link-url" placeholder="https://...">
                        </div>
                        <div class="knowledge-form-group">
                            <label>链接描述</label>
                            <input type="text" id="knowledge-doc-link-desc" placeholder="链接描述">
                        </div>
                    </div>
                    <div class="knowledge-form-row">
                        <div class="knowledge-form-group">
                            <label>标签</label>
                            <input type="text" id="knowledge-doc-tags" placeholder="标签，逗号分隔">
                        </div>
                        <div class="knowledge-form-group">
                            <label>状态</label>
                            <select id="knowledge-doc-status">
                                <option value="1">已发布</option>
                                <option value="0">草稿</option>
                                <option value="2">已归档</option>
                            </select>
                        </div>
                    </div>
                    <div class="knowledge-form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeDocModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 文档详情弹窗 -->
        <div id="knowledge-doc-detail-modal" class="knowledge-modal" style="display:none;">
            <div class="knowledge-modal-content knowledge-modal-large">
                <div class="knowledge-modal-header">
                    <h3 id="knowledge-doc-detail-title">文档详情</h3>
                    <button class="knowledge-modal-close" onclick="closeDocDetail()">&times;</button>
                </div>
                <div id="knowledge-doc-detail-body" class="knowledge-doc-detail-body"></div>
            </div>
        </div>
    </div>

    <!-- Tab 3: 模型管理 -->
    <div id="models-tab-content" class="manage-tab-content">
        <div class="model-section">
            <div class="section-header">
                <h2>模型配置</h2>
                <button class="btn btn-primary" onclick="showModelForm()">+ 新增模型</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>排序</th>
                        <th>模型标识</th>
                        <th>显示名称</th>
                        <th>服务商</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>激活</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="model-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 模型编辑弹窗 -->
        <div id="model-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="model-modal-title">新增模型</h3>
                    <button class="modal-close" onclick="closeModelModal()">×</button>
                </div>
                <form id="model-form" class="modal-form" onsubmit="saveModel(event)">
                    <input type="hidden" id="model-id">
                    <div class="form-group">
                        <label>模型标识 *</label>
                        <input type="text" id="model-name-input" required placeholder="例如: qwen-max">
                    </div>
                    <div class="form-group">
                        <label>显示名称 *</label>
                        <input type="text" id="model-display-name" required placeholder="例如: 通义千问 Max">
                    </div>
                    <div class="form-group">
                        <label>服务商</label>
                        <input type="text" id="model-provider" value="dashscope" placeholder="dashscope">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="model-description" placeholder="模型描述">
                    </div>
                    <div class="form-group">
                        <label>排序</label>
                        <input type="number" id="model-sort-order" value="0" min="0">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModelModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detail-modal" class="modal" style="display:none;">
    <div class="modal-content detail-modal-content">
        <div class="modal-header">
            <h3 id="detail-modal-title">详情</h3>
            <button class="modal-close" onclick="closeDetailModal()">&times;</button>
        </div>
        <div id="detail-modal-body" class="detail-modal-body"></div>
    </div>
</div>

<!-- 公共导航栏 -->
<script src="js/navbar.js?v=10"></script>
<script src="js/knowledge.js?v=6"></script>
<script src="js/ai-manage.js?v=5"></script>
</body>
</html>

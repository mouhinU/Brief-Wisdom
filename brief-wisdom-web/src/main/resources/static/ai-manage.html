<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>AI助手管理</title>
    <link href="css/navbar.css?v=8" rel="stylesheet">
    <link href="css/ai-manage.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>AI助手管理</h1>
    </header>

    <!-- 顶部 Tab 导航 -->
    <nav class="manage-tabs">
        <button class="manage-tab-btn" data-tab="models" onclick="switchManageTab('models')">模型管理</button>
        <button class="manage-tab-btn active" data-tab="sessions" onclick="switchManageTab('sessions')">会话历史
        </button>
    </nav>

    <!-- Tab 1: 会话历史 -->
    <div class="manage-tab-content active" id="sessions-tab-content">
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>用户级别：</label>
                <select id="level-filter" onchange="onLevelFilterChange()">
                    <option value="">全部</option>
                    <option value="admin">管理员</option>
                    <option value="vip">会员</option>
                    <option value="normal">普通用户</option>
                </select>
            </div>
            <div class="filter-group">
                <label>查询方式：</label>
                <select id="query-mode" onchange="onQueryModeChange()">
                    <option value="user">按用户查询会话</option>
                    <option value="level">按级别查询会话</option>
                </select>
            </div>
        </div>

        <!-- 三栏布局 -->
        <div class="panels">
            <!-- 左栏：用户列表 -->
            <div class="panel panel-users">
                <div class="panel-header">
                    <h2>用户列表</h2>
                    <span class="count-badge" id="user-count">0</span>
                </div>
                <div class="panel-body" id="user-list"></div>
            </div>

            <!-- 中栏：会话列表 -->
            <div class="panel panel-sessions">
                <div class="panel-header">
                    <h2 id="session-title">会话列表</h2>
                    <span class="count-badge" id="session-count">0</span>
                </div>
                <div class="panel-body" id="session-list">
                    <div class="empty-hint">请选择用户查看会话</div>
                </div>
            </div>

            <!-- 右栏：消息详情 -->
            <div class="panel panel-messages">
                <div class="panel-header">
                    <h2 id="message-title">消息详情</h2>
                    <span class="count-badge" id="message-count">0</span>
                </div>
                <div class="panel-body" id="message-list">
                    <div class="empty-hint">请选择会话查看消息</div>
                </div>
            </div>
        </div>
    </div><!-- /sessions-tab-content -->

    <!-- Tab 2: 模型管理 -->
    <div class="manage-tab-content" id="models-tab-content">
        <div class="model-section">
            <div class="section-header">
                <h2>模型配置</h2>
                <button class="btn btn-primary" onclick="showModelForm()">+ 新增模型</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>排序</th>
                        <th>模型标识</th>
                        <th>显示名称</th>
                        <th>服务商</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>激活</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="model-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 模型编辑弹窗 -->
        <div class="modal" id="model-modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="model-modal-title">新增模型</h3>
                    <button class="modal-close" onclick="closeModelModal()">×</button>
                </div>
                <form class="modal-form" id="model-form" onsubmit="saveModel(event)">
                    <input id="model-id" type="hidden">
                    <div class="form-group">
                        <label>模型标识 *</label>
                        <input id="model-name-input" placeholder="例如: qwen-max" required type="text">
                    </div>
                    <div class="form-group">
                        <label>显示名称 *</label>
                        <input id="model-display-name" placeholder="例如: 通义千问 Max" required type="text">
                    </div>
                    <div class="form-group">
                        <label>服务商</label>
                        <input id="model-provider" placeholder="dashscope" type="text" value="dashscope">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input id="model-description" placeholder="模型描述" type="text">
                    </div>
                    <div class="form-group">
                        <label>排序</label>
                        <input id="model-sort-order" min="0" type="number" value="0">
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeModelModal()" type="button">取消</button>
                        <button class="btn btn-primary" type="submit">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detail-modal" style="display:none;">
    <div class="modal-content detail-modal-content">
        <div class="modal-header">
            <h3 id="detail-modal-title">详情</h3>
            <button class="modal-close" onclick="closeDetailModal()">&times;</button>
        </div>
        <div class="detail-modal-body" id="detail-modal-body"></div>
    </div>
</div>

<!-- 公共导航栏 -->
<script src="js/navbar.js?v=5"></script>
<script src="js/ai-manage.js"></script>
</body>
</html>

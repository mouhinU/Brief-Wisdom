<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理</title>
    <link rel="stylesheet" href="css/navbar.css?v=11">
    <link rel="stylesheet" href="css/knowledge.css?v=1">
</head>
<body>
<div class="container">
    <header>
        <h1>📚 知识库管理</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="showBaseForm()">+ 新建知识库</button>
        </div>
    </header>

    <div class="knowledge-layout">
        <!-- 左侧：知识库列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>知识库</h3>
            </div>
            <div id="base-list" class="base-list">
                <div class="empty-hint">加载中...</div>
            </div>
        </div>

        <!-- 右侧：文档列表 -->
        <div class="main-content">
            <div class="content-header">
                <div class="content-title">
                    <h2 id="current-base-name">请选择知识库</h2>
                    <span id="doc-count" class="count-badge">0</span>
                </div>
                <div class="content-actions">
                    <input type="text" id="search-input" class="search-input" placeholder="搜索文档..." onkeyup="handleSearch(event)">
                    <div class="doc-type-filter">
                        <button class="filter-btn active" data-type="" onclick="filterByType('')">全部</button>
                        <button class="filter-btn" data-type="INTERNAL" onclick="filterByType('INTERNAL')">📝 内部文档</button>
                        <button class="filter-btn" data-type="FILE" onclick="filterByType('FILE')">📎 文件</button>
                        <button class="filter-btn" data-type="LINK" onclick="filterByType('LINK')">🔗 外部链接</button>
                    </div>
                    <button class="btn btn-primary" id="add-doc-btn" onclick="showDocForm()" style="display:none;">+ 新建文档</button>
                </div>
            </div>

            <!-- 文档列表 -->
            <div id="document-list" class="document-list">
                <div class="empty-hint">请从左侧选择一个知识库</div>
            </div>

            <!-- 分页 -->
            <div id="pagination" class="pagination" style="display:none;"></div>
        </div>
    </div>
</div>

<!-- 知识库表单弹窗 -->
<div id="base-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="base-modal-title">新建知识库</h3>
            <button class="modal-close" onclick="closeBaseModal()">&times;</button>
        </div>
        <form id="base-form" class="modal-form" onsubmit="saveBase(event)">
            <input type="hidden" id="base-id">
            <div class="form-group">
                <label>名称 *</label>
                <input type="text" id="base-name" required placeholder="知识库名称">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="base-description" rows="3" placeholder="知识库描述"></textarea>
            </div>
            <div class="form-group">
                <label>图标</label>
                <input type="text" id="base-icon" value="📚" placeholder="emoji 图标">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>排序</label>
                    <input type="number" id="base-sort-order" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>是否公开</label>
                    <select id="base-is-public">
                        <option value="0">私有</option>
                        <option value="1">公开</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>父级知识库</label>
                <select id="base-parent-id">
                    <option value="0">无（顶级知识库）</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeBaseModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 文档表单弹窗 -->
<div id="doc-modal" class="modal" style="display:none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3 id="doc-modal-title">新建文档</h3>
            <button class="modal-close" onclick="closeDocModal()">&times;</button>
        </div>
        <form id="doc-form" class="modal-form" onsubmit="saveDoc(event)">
            <input type="hidden" id="doc-id">
            <div class="form-group">
                <label>文档类型 *</label>
                <div class="doc-type-selector">
                    <label class="doc-type-option">
                        <input type="radio" name="docType" value="INTERNAL" checked onchange="onDocTypeChange()">
                        <span class="doc-type-card">
                            <span class="doc-type-icon">📝</span>
                            <span class="doc-type-name">内部文档</span>
                            <span class="doc-type-desc">富文本编辑</span>
                        </span>
                    </label>
                    <label class="doc-type-option">
                        <input type="radio" name="docType" value="FILE" onchange="onDocTypeChange()">
                        <span class="doc-type-card">
                            <span class="doc-type-icon">📎</span>
                            <span class="doc-type-name">文件上传</span>
                            <span class="doc-type-desc">PDF/Word等</span>
                        </span>
                    </label>
                    <label class="doc-type-option">
                        <input type="radio" name="docType" value="LINK" onchange="onDocTypeChange()">
                        <span class="doc-type-card">
                            <span class="doc-type-icon">🔗</span>
                            <span class="doc-type-name">外部链接</span>
                            <span class="doc-type-desc">引用外部文档</span>
                        </span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="doc-title" required placeholder="文档标题">
            </div>

            <!-- 内部文档内容 -->
            <div id="internal-fields">
                <div class="form-group">
                    <label>文档内容</label>
                    <textarea id="doc-content" rows="15" class="content-editor" placeholder="请输入文档内容（支持HTML）"></textarea>
                </div>
            </div>

            <!-- 文件上传字段 -->
            <div id="file-fields" style="display:none;">
                <div class="form-group">
                    <label>文件URL *</label>
                    <input type="text" id="doc-file-url" placeholder="文件存储URL">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>文件名</label>
                        <input type="text" id="doc-file-name" placeholder="原始文件名">
                    </div>
                    <div class="form-group">
                        <label>文件大小(字节)</label>
                        <input type="number" id="doc-file-size" placeholder="文件大小">
                    </div>
                </div>
                <div class="form-group">
                    <label>文件类型</label>
                    <input type="text" id="doc-file-type" placeholder="如: application/pdf">
                </div>
            </div>

            <!-- 外部链接字段 -->
            <div id="link-fields" style="display:none;">
                <div class="form-group">
                    <label>链接URL *</label>
                    <input type="text" id="doc-link-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>链接描述</label>
                    <input type="text" id="doc-link-desc" placeholder="链接描述">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>标签</label>
                    <input type="text" id="doc-tags" placeholder="标签，逗号分隔">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="doc-status">
                        <option value="1">已发布</option>
                        <option value="0">草稿</option>
                        <option value="2">已归档</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeDocModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 文档详情弹窗 -->
<div id="doc-detail-modal" class="modal" style="display:none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3 id="doc-detail-title">文档详情</h3>
            <button class="modal-close" onclick="closeDocDetail()">&times;</button>
        </div>
        <div id="doc-detail-body" class="doc-detail-body"></div>
    </div>
</div>

<!-- 公共导航栏 -->
<script src="js/navbar.js?v=10"></script>
<script src="js/knowledge.js?v=1"></script>
</body>
</html>

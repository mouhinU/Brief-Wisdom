<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>系统设置</title>
    <link href="css/navbar.css?v=8" rel="stylesheet">
    <link href="css/system-settings.css?v=5" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>系统设置</h1>
    </header>

    <!-- Tab 导航 -->
    <nav class="settings-tabs">
        <button class="settings-tab-btn active" data-tab="menu" onclick="switchSettingsTab('menu')">菜单管理</button>
        <button class="settings-tab-btn" data-tab="user" onclick="switchSettingsTab('user')">用户管理</button>
    </nav>

    <!-- Tab 1: 菜单管理 -->
    <div class="settings-tab-content active" id="menu-tab-content">
        <section class="settings-section">
            <div class="section-header">
                <h2>菜单管理</h2>
                <button class="btn btn-primary" onclick="showMenuForm()">+ 新增菜单</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>排序</th>
                        <th>图标</th>
                        <th>菜单名称</th>
                        <th>链接</th>
                        <th>打开方式</th>
                        <th>显示</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="menu-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Tab 2: 用户管理 -->
    <div class="settings-tab-content" id="user-tab-content">
        <section class="settings-section">
            <div class="section-header">
                <h2>用户管理</h2>
                <div class="user-filter-bar">
                    <select id="user-level-filter" onchange="loadUsers()">
                        <option value="">全部级别</option>
                        <option value="admin">管理员</option>
                        <option value="vip">会员</option>
                        <option value="normal">普通用户</option>
                    </select>
                    <input id="user-search-input" onkeydown="if(event.key==='Enter')loadUsers()" placeholder="搜索用户名/昵称"
                           type="text">
                    <button class="btn btn-primary btn-sm" onclick="loadUsers()">搜索</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>级别</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
            <!-- 分页 -->
            <div class="pagination-bar" id="user-pagination"></div>
        </section>
    </div>

    <!-- 菜单弹窗 -->
    <div class="modal" id="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新增菜单</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form class="modal-form" id="menu-form" onsubmit="saveMenu(event)">
                <input id="menu-id" type="hidden">
                <div class="form-group">
                    <label>菜单名称 *</label>
                    <input id="menu-name" placeholder="例如：首页" required type="text">
                </div>
                <div class="form-group">
                    <label>链接 *</label>
                    <input id="menu-url" placeholder="例如：/ 或 /about.html" required type="text">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <input id="menu-icon" placeholder="Emoji 或图标类名，例如：🏠" type="text">
                </div>
                <div class="form-group">
                    <label>排序序号</label>
                    <input id="menu-sort" min="0" type="number" value="0">
                </div>
                <div class="form-group">
                    <label>打开方式</label>
                    <select id="menu-target">
                        <option value="_self">当前窗口</option>
                        <option value="_blank">新窗口</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>是否显示</label>
                    <select id="menu-visible">
                        <option value="1">显示</option>
                        <option value="0">隐藏</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="closeModal()" type="button">取消</button>
                    <button class="btn btn-primary" type="submit">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 用户级别修改弹窗 -->
    <div class="modal" id="user-level-modal" style="display:none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>修改用户级别</h3>
                <button class="modal-close" onclick="closeUserLevelModal()">×</button>
            </div>
            <form class="modal-form" onsubmit="saveUserLevel(event)">
                <input id="user-level-id" type="hidden">
                <div class="form-group">
                    <label>用户级别</label>
                    <select id="user-level-select">
                        <option value="admin">管理员</option>
                        <option value="vip">会员</option>
                        <option value="normal">普通用户</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="closeUserLevelModal()" type="button">取消</button>
                    <button class="btn btn-primary" type="submit">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 公共导航栏 -->
<script src="js/navbar.js?v=5"></script>
<script src="js/system-settings.js?v=5"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置</title>
    <link rel="stylesheet" href="css/navbar.css?v=11">
    <link rel="stylesheet" href="css/system-settings.css?v=8">
</head>
<body>
<div class="container">
    <header>
        <h1>系统设置</h1>
    </header>

    <!-- Tab 导航（由 initPageTabs 动态渲染） -->
    <nav class="settings-tabs"></nav>

    <!-- Tab 1: 菜单管理 -->
    <div id="menu-tab-content" class="settings-tab-content active">
        <section class="settings-section">
            <div class="section-header">
                <h2>菜单管理</h2>
                <button class="btn btn-primary" onclick="showMenuForm()">+ 新增菜单</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>排序</th>
                        <th>图标</th>
                        <th>菜单名称</th>
                        <th>类型</th>
                        <th>父级菜单</th>
                        <th>链接</th>
                        <th>显示</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="menu-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Tab 2: 用户管理 -->
    <div id="user-tab-content" class="settings-tab-content">
        <section class="settings-section">
            <div class="section-header">
                <h2>用户管理</h2>
                <div class="user-filter-bar">
                    <select id="user-level-filter" onchange="loadUsers()">
                        <option value="">全部级别</option>
                        <option value="admin">管理员</option>
                        <option value="vip">会员</option>
                        <option value="normal">普通用户</option>
                    </select>
                    <input type="text" id="user-search-input" placeholder="搜索用户名/昵称"
                           onkeydown="if(event.key==='Enter')loadUsers()">
                    <button class="btn btn-primary btn-sm" onclick="loadUsers()">搜索</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>级别</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
            <!-- 分页 -->
            <div class="pagination-bar" id="user-pagination"></div>
        </section>
    </div>

    <!-- Tab 3: 角色管理 -->
    <div id="role-tab-content" class="settings-tab-content">
        <section class="settings-section">
            <div class="section-header">
                <h2>角色管理</h2>
                <button class="btn btn-primary" onclick="showRoleForm()">+ 新增角色</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>角色名称</th>
                        <th>角色标识</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="role-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- 菜单弹窗 -->
    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新增菜单</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="menu-form" class="modal-form" onsubmit="saveMenu(event)">
                <input type="hidden" id="menu-id">
                <div class="form-group">
                    <label>菜单类型</label>
                    <select id="menu-type" onchange="onMenuTypeChange()">
                        <option value="0">目录</option>
                        <option value="1" selected>菜单</option>
                        <option value="2">按钮</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>父级菜单</label>
                    <select id="menu-parent">
                        <option value="0">顶级菜单</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>菜单名称 *</label>
                    <input type="text" id="menu-name" required placeholder="例如：首页">
                </div>
                <div class="form-group" id="menu-url-group">
                    <label>链接</label>
                    <input type="text" id="menu-url" placeholder="例如：/ 或 /about.html">
                </div>
                <div class="form-group" id="menu-perm-group" style="display:none;">
                    <label>权限标识</label>
                    <input type="text" id="menu-permission" placeholder="例如：user:create">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <input type="text" id="menu-icon" placeholder="Emoji 或图标类名，例如：🏠">
                </div>
                <div class="form-group">
                    <label>排序序号</label>
                    <input type="number" id="menu-sort" value="0" min="0">
                </div>
                <div class="form-group" id="menu-target-group">
                    <label>打开方式</label>
                    <select id="menu-target">
                        <option value="_self">当前窗口</option>
                        <option value="_blank">新窗口</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>是否显示</label>
                    <select id="menu-visible">
                        <option value="1">显示</option>
                        <option value="0">隐藏</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>需要登录</label>
                    <select id="menu-require-login">
                        <option value="0">否</option>
                        <option value="1">是</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 角色表单弹窗 -->
    <div id="role-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="role-modal-title">新增角色</h3>
                <button class="modal-close" onclick="closeRoleModal()">×</button>
            </div>
            <form id="role-form" class="modal-form" onsubmit="saveRole(event)">
                <input type="hidden" id="role-id">
                <div class="form-group">
                    <label>角色名称 *</label>
                    <input type="text" id="role-name" required placeholder="例如：超级管理员">
                </div>
                <div class="form-group">
                    <label>角色标识 *</label>
                    <input type="text" id="role-key" required placeholder="例如：super_admin">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="role-desc" placeholder="角色描述">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="role-status">
                        <option value="1">启用</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeRoleModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 角色菜单权限弹窗 -->
    <div id="menu-perm-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="menu-perm-title">分配菜单权限</h3>
                <button class="modal-close" onclick="closeMenuPermModal()">×</button>
            </div>
            <div class="modal-form">
                <div class="menu-tree-actions">
                    <button type="button" class="btn btn-sm btn-secondary" onclick="checkAllMenus(true)">全选</button>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="checkAllMenus(false)">取消全选</button>
                </div>
                <div id="menu-perm-tree" class="menu-perm-tree"></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeMenuPermModal()">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveMenuPermissions()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户角色分配弹窗 -->
    <div id="user-role-modal" class="modal" style="display:none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 id="user-role-title">分配角色</h3>
                <button class="modal-close" onclick="closeUserRoleModal()">×</button>
            </div>
            <div class="modal-form">
                <div id="user-role-checkboxes" class="role-checkbox-list"></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeUserRoleModal()">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveUserRoles()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户级别修改弹窗 -->
    <div id="user-level-modal" class="modal" style="display:none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>修改用户级别</h3>
                <button class="modal-close" onclick="closeUserLevelModal()">×</button>
            </div>
            <form class="modal-form" onsubmit="saveUserLevel(event)">
                <input type="hidden" id="user-level-id">
                <div class="form-group">
                    <label>用户级别</label>
                    <select id="user-level-select">
                        <option value="admin">管理员</option>
                        <option value="vip">会员</option>
                        <option value="normal">普通用户</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeUserLevelModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 公共导航栏 -->
<script src="js/navbar.js?v=10"></script>
<script src="js/system-settings.js?v=10"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>系统设置</title>
    <link href="css/navbar.css?v=11" rel="stylesheet">
    <link href="css/system-settings.css?v=8" rel="stylesheet">
    <link href="css/ai-manage.css?v=10" rel="stylesheet">
    <link href="css/resume-editor.css?v=1" rel="stylesheet">
    <link href="css/resume-manage.css" rel="stylesheet">
    <link href="css/ai-polish.css?v=2" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>系统设置</h1>
    </header>

    <!-- Tab 导航（由 initPageTabs 动态渲染） -->
    <nav class="settings-tabs"></nav>

    <!-- 所有 Tab 内容由对应组件动态渲染，HTML 只保留空容器 -->

    <!-- Tab: 菜单管理 -->
    <div class="settings-tab-content active" id="menu-tab-content"></div>

    <!-- Tab: 用户管理 -->
    <div class="settings-tab-content" id="user-tab-content"></div>

    <!-- Tab: 角色管理 -->
    <div class="settings-tab-content" id="role-tab-content"></div>

    <!-- Tab: 知识库 -->
    <div class="settings-tab-content" id="knowledge-tab-content"></div>

    <!-- Tab: 模型管理 -->
    <div class="settings-tab-content" id="models-tab-content"></div>

    <!-- Tab: 会话历史 -->
    <div class="settings-tab-content" id="sessions-tab-content"></div>

    <!-- Tab: 在线编辑 -->
    <div class="settings-tab-content" id="online-editor-tab-content"></div>

    <!-- Tab: 工作经历 -->
    <div class="settings-tab-content" id="experience-tab-content"></div>

    <!-- Tab: 项目经历 -->
    <div class="settings-tab-content" id="project-tab-content"></div>

    <!-- Tab: 项目成果 -->
    <div class="settings-tab-content" id="achievement-tab-content"></div>

    <!-- Tab: 技术栈 -->
    <div class="settings-tab-content" id="tech-stack-tab-content"></div>

    <!-- Tab: AI安全审计 -->
    <div class="settings-tab-content" id="audit-log-tab-content"></div>
</div>

<!-- 公共导航栏 -->
<script src="js/i18n.js"></script>
<script src="js/api-request.js"></script>
<script src="js/navbar.js?v=10"></script>
<!-- 组件加载器 -->
<script src="components/component-loader.js"></script>
<!-- 系统设置页面脚本（轻量级，只负责Tab切换和组件加载） -->
<script src="js/system-settings-lite.js"></script>
</body>
</html>

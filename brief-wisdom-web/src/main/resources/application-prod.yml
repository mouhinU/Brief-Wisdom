# 生产环境配置
# 启动方式: SPRING_PROFILES_ACTIVE=prod

spring:
  devtools:
    restart:
      enabled: false

# 生产环境 CORS：仅允许实际部署域名，禁止通配符
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-domain.com}

  knowledge:
    import-base-dir: ${KNOWLEDGE_IMPORT_BASE_DIR:}
    import-allowed-dirs: docs
    import-allowed-files: AGENTS.md

logging:
  level:
    root: INFO
    com.mouhin.brief.wisdom: INFO

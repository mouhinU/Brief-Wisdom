server:
  port: 8090
  # 启用虚拟线程（Java 21），Tomcat 请求处理使用虚拟线程而非平台线程
  threads:
    virtual:
      enabled: true
spring:
  application:
    name: brief-wisdom
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  messages:
    basename: i18n/messages
    encoding: UTF-8
    cache-duration: 3600s
  datasource:
    url: jdbc:mysql://localhost:3306/brief_wisdom?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
  # Redis 配置（Redisson 自动读取此配置）
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 5000ms
      jedis:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
  # Spring Session 使用 Redis 存储
  session:
    store-type: redis
    redis:
      namespace: bw:session
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: flyway_schema_history
  # Thymeleaf 配置（项目使用静态HTML，不使用模板引擎）
  thymeleaf:
    check-template-location: false  # 禁用模板位置检查
  # Spring AI Vector Store 配置（Redis Vector Store）
  ai:
    vectorstore:
      redis:
        initialize-schema: true
        index-name: brief-wisdom-knowledge
        prefix: "bw:doc:"
        distance-metric: COSINE

# 日志配置已移至 logback-spring.xml

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mouhin.brief.wisdom.persistence.model
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Actuator / Prometheus 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 实时同步配置
app:
  # 短信服务配置：mock（日志模拟）/ aliyun（阿里云短信）
  sms:
    provider: mock    # mock / aliyun
    # aliyun:
    #   access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    #   access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    #   sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    #   template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
  # AI 多提供商统一配置（ChatModelRegistry 根据 ai_model.provider 字段路由）
  ai:
    default-provider: dashscope    # 默认提供商
    providers:
      dashscope:
        type: openai               # DashScope 走 OpenAI 兼容协议
        api-key: ${DASHSCOPE_API_KEY:${AI_API_KEY:}}
        base-url: https://ws-9kyl51kfnjmu4lp0.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
        model: qwen-max
      #      openai:
      #        type: openai
      #        api-key: ${OPENAI_API_KEY:your-openai-api-key}
      #        base-url: https://api.openai.com
      #        model: gpt-4o
      #      anthropic:
      #        type: anthropic
      #        api-key: ${ANTHROPIC_API_KEY:your-anthropic-api-key}
      #        base-url: https://api.anthropic.com
      #        model: claude-sonnet-4-20250514
      deepseek:
        type: openai
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com
        model: deepseek-chat
  sync:
    # transport: sse    # 同步传输方式：sse（Server-Sent Events）或 websocket（双向通信）
    transport: websocket    # 同步传输方式：sse（Server-Sent Events）或 websocket（双向通信）

  # AI 聊天模式配置
  chat:
    streaming: true    # 是否启用流式输出（打字机效果），true=流式，false=普通阻塞式

  # 分页配置 - 按业务维度配置每页查询条数
  pagination:
    session-list:
      default-size: 20    # 会话列表默认每页条数
      max-size: 100       # 会话列表最大每页条数
    message-history:
      default-size: 20    # 消息历史默认每页条数
      max-size: 200       # 消息历史最大每页条数

  # CORS 允许的域名（逗号分隔），生产环境必须配置为实际域名
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8090,http://localhost:3000}

  # 知识库 Markdown 导入路径白名单
  knowledge:
    import-base-dir: ${KNOWLEDGE_IMPORT_BASE_DIR:}
    import-allowed-dirs: docs
    import-allowed-files: AGENTS.md

# 微信开放平台扫码登录配置
wechat:
  open:
    app-id: ${WECHAT_APP_ID:your-app-id}
    app-secret: ${WECHAT_APP_SECRET:your-app-secret}
    redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:8090/auth/wechat/callback}
    authorize-url: https://open.weixin.qq.com/connect/qrconnect
    token-url: https://api.weixin.qq.com/sns/oauth2/access_token
    userinfo-url: https://api.weixin.qq.com/sns/userinfo

# 钉钉扫码登录配置（OAuth2.0）
dingtalk:
  app-key: ${DINGTALK_APP_KEY:your-app-key}
  app-secret: ${DINGTALK_APP_SECRET:your-app-secret}
  redirect-uri: ${DINGTALK_REDIRECT_URI:http://localhost:8090/auth/dingtalk/callback}
  authorize-url: https://login.dingtalk.com/oauth2/auth
  token-url: https://api.dingtalk.com/v1.0/oauth2/userAccessToken
  userinfo-url: https://api.dingtalk.com/v1.0/contact/users/me

# 支付宝扫码登录配置
alipay:
  app-id: ${ALIPAY_APP_ID:your-app-id}
  private-key: ${ALIPAY_PRIVATE_KEY:your-private-key}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:your-alipay-public-key}
  redirect-uri: ${ALIPAY_REDIRECT_URI:http://localhost:8090/auth/alipay/callback}
  gateway-url: https://openapi.alipay.com/gateway.do

server:
  port: 8090

spring:
  application:
    name: brief-wisdom
  profiles:
    include: dev
  datasource:
    url: jdbc:mysql://localhost:3306/brief_wisdom?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  # DevTools 热部署配置
  devtools:
    restart:
      enabled: true  # 启用热部署
      additional-paths: src/main/java  # 监控的额外路径
      exclude: static/**,templates/**  # 排除静态资源（使用 livereload）
    livereload:
      enabled: true  # 启用 LiveReload
      port: 35729
  # 静态资源缓存控制（开发阶段禁用缓存）
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          must-revalidate: true
  ai:
    openai:
      api-key: sk-ws-H.RYIRPII.ukzF.MEUCIAz2FAPKXjafgpbbbaJjIolASqZdy80jc6THGoae97HqAiEAx0XdsnPrK6f3akRLMc7K-AsLCdgNi3-DH0B8hvRZoSg
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-max
  # Redis 配置（Redisson 自动读取此配置）
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
  # Spring Session 使用 Redis 存储
  session:
    store-type: redis
    redis:
      namespace: bw:session

# 日志配置 - 抑制 Chrome DevTools 探测请求的无资源告警
logging:
  level:
    org.springframework.web.servlet.resource.NoResourceFoundException: ERROR
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: ERROR

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mouhin.brief.wisdom.persistence.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 实时同步配置
app:
  sync:
    # transport: sse    # 同步传输方式：sse（Server-Sent Events）或 websocket（双向通信）
    transport: websocket    # 同步传输方式：sse（Server-Sent Events）或 websocket（双向通信）

# 分页配置 - 按业务维度配置每页查询条数
  pagination:
    session-list:
      default-size: 20    # 会话列表默认每页条数
      max-size: 100       # 会话列表最大每页条数
    message-history:
      default-size: 20    # 消息历史默认每页条数
      max-size: 200       # 消息历史最大每页条数

# 微信开放平台扫码登录配置
wechat:
  open:
    app-id: ${WECHAT_APP_ID:your-app-id}
    app-secret: ${WECHAT_APP_SECRET:your-app-secret}
    redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:8090/auth/wechat/callback}
    authorize-url: https://open.weixin.qq.com/connect/qrconnect
    token-url: https://api.weixin.qq.com/sns/oauth2/access_token
    userinfo-url: https://api.weixin.qq.com/sns/userinfo

# 钉钉扫码登录配置（OAuth2.0）
dingtalk:
  app-key: ${DINGTALK_APP_KEY:your-app-key}
  app-secret: ${DINGTALK_APP_SECRET:your-app-secret}
  redirect-uri: ${DINGTALK_REDIRECT_URI:http://localhost:8090/auth/dingtalk/callback}
  authorize-url: https://login.dingtalk.com/oauth2/auth
  token-url: https://api.dingtalk.com/v1.0/oauth2/userAccessToken
  userinfo-url: https://api.dingtalk.com/v1.0/contact/users/me

# 支付宝扫码登录配置
alipay:
  app-id: ${ALIPAY_APP_ID:your-app-id}
  private-key: ${ALIPAY_PRIVATE_KEY:your-private-key}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:your-alipay-public-key}
  redirect-uri: ${ALIPAY_REDIRECT_URI:http://localhost:8090/auth/alipay/callback}
  gateway-url: https://openapi.alipay.com/gateway.do
